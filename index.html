<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Nodir Tir Health Care</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--base:#0c6447;--base2:#003d17;--sw:255px;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222;font-size:13.5px}
a{text-decoration:none;color:inherit;cursor:pointer}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f1f1}
::-webkit-scrollbar-thumb{background:var(--base);border-radius:4px}

/* ══════════════════════════ LOGIN ══════════════════════════ */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#004d2e 0%,#0c6447 45%,#1a8a5e 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:18px}
.login-bg-pattern{position:absolute;inset:0;opacity:.05;background-image:radial-gradient(circle at 2px 2px,#fff 1px,transparent 0);background-size:32px 32px}
.login-card{background:#fff;border-radius:18px;padding:44px 38px;max-width:420px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.3);position:relative;z-index:1}
.login-logo-area{text-align:center;margin-bottom:28px}
.login-logo-circle{width:70px;height:70px;background:linear-gradient(135deg,var(--base),var(--base2));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 13px;box-shadow:0 4px 18px rgba(12,100,71,.35)}
.login-logo-circle img{width:50px;height:50px;object-fit:contain;border-radius:50%;display:none}
.login-logo-circle i{font-size:28px;color:#fff}
.login-site-nm{font-size:18px;font-weight:800;color:#1a1a2e;margin-bottom:2px}
.login-sub{font-size:12.5px;color:#888}
.lg-group{margin-bottom:14px}
.lg-lbl{font-size:12.5px;font-weight:600;color:#555;margin-bottom:5px;display:block}
.lg-inp{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;color:#333;font-family:inherit}
.lg-inp:focus{border-color:var(--base);box-shadow:0 0 0 3px rgba(12,100,71,.1)}
.pwd-rel{position:relative}
.pwd-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#aaa;font-size:14px;cursor:pointer;padding:0;transition:color .2s}
.pwd-eye:hover{color:var(--base)}
.lg-btn{width:100%;background:linear-gradient(135deg,var(--base),var(--base2));color:#fff;border:none;padding:13px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:6px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.lg-btn:hover{opacity:.9}
.lg-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{background:#fee2e2;color:#b91c1c;padding:10px 13px;border-radius:7px;font-size:13px;margin-bottom:13px;display:none;align-items:center;gap:7px;border:1px solid #fecaca}
.login-err.show{display:flex}

/* ══════════════════════════ MAIN LAYOUT ══════════════════════════ */
#admin-main{display:none;min-height:100vh}
.admin-wrap{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sw);background:#1a2e22;color:#b8cfc0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:200;transition:transform .3s;display:flex;flex-direction:column}
.sb-top{padding:16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:11px;flex-shrink:0}
.sb-logo-box{width:40px;height:40px;border-radius:9px;overflow:hidden;flex-shrink:0;background:var(--base);display:flex;align-items:center;justify-content:center}
.sb-logo-box img{width:100%;height:100%;object-fit:contain;display:none}
.sb-logo-box i{color:#fff;font-size:18px}
.sb-site-nm{font-size:13.5px;font-weight:700;color:#fff;line-height:1.3}
.sb-site-sub{font-size:10.5px;color:#6a8;margin-top:1px}
.sb-sec-lbl{padding:12px 16px 5px;font-size:10px;font-weight:700;color:#6a8;text-transform:uppercase;letter-spacing:1px}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 16px;color:#b8cfc0;transition:all .18s;cursor:pointer;border-left:3px solid transparent;font-size:13px;font-weight:500}
.sb-link:hover,.sb-link.active{background:rgba(255,255,255,.07);color:#fff;border-left-color:var(--base)}
.sb-link i{width:18px;text-align:center;font-size:15px;opacity:.8}
.sb-link.active i{opacity:1;color:#7fffb0}
.sb-pend{margin-left:auto;background:var(--base);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700}
.sb-foot{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(255,255,255,.08)}
.sb-logout{display:flex;align-items:center;gap:9px;padding:9px 12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:7px;color:#f87171;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;width:100%}
.sb-logout:hover{background:rgba(239,68,68,.2);color:#fca5a5}

/* MAIN */
.main-area{margin-left:var(--sw);flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;padding:0 22px;height:58px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8ecf0;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tb-left{display:flex;align-items:center;gap:12px}
.hamburger{background:none;border:none;font-size:19px;color:#666;cursor:pointer;padding:6px;border-radius:6px;transition:background .2s}
.hamburger:hover{background:#f0f0f0}
.tb-bc{font-size:13px;color:#888;font-weight:500}
.tb-right{display:flex;align-items:center;gap:14px}
.tb-admin-nm{font-size:13px;color:#555;font-weight:500}
.admin-av{width:34px;height:34px;border-radius:50%;background:var(--base);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.pg-area{padding:22px;flex:1}

/* ══════════════════════════ COMPONENTS ══════════════════════════ */
.pg-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.pg-title{font-size:19px;font-weight:800;color:#1a1a2e;display:flex;align-items:center;gap:9px}
.pg-title i{color:var(--base);font-size:18px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:var(--radius);padding:18px;border:1px solid #e8ecf0;display:flex;align-items:center;gap:14px;transition:box-shadow .2s}
.stat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
.stat-ic{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ic-g{background:#ecfdf5;color:#059669}.ic-b{background:#eff6ff;color:#2563eb}.ic-o{background:#fff7ed;color:#ea580c}.ic-p{background:#faf5ff;color:#7c3aed}
.stat-v{font-size:22px;font-weight:800;color:#1a1a2e;line-height:1.1}
.stat-l{font-size:12px;color:#888;margin-top:2px}
.stat-ch{font-size:12px;color:var(--base);margin-top:3px;font-weight:600}

/* CARD */
.card{background:#fff;border-radius:var(--radius);border:1px solid #e8ecf0;overflow:hidden;margin-bottom:18px}
.card-hd{padding:13px 18px;border-bottom:1px solid #f0f2f5;display:flex;align-items:center;justify-content:space-between;background:#fafbfc}
.card-title{font-size:14px;font-weight:700;color:#1a1a2e;display:flex;align-items:center;gap:7px}
.card-body{padding:18px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
.dtbl{width:100%;border-collapse:collapse}
.dtbl th{background:#f8f9fa;padding:10px 14px;font-size:12px;font-weight:700;color:#555;text-align:left;border-bottom:2px solid #e8ecf0;white-space:nowrap;letter-spacing:.3px}
.dtbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
.dtbl tr:last-child td{border-bottom:none}
.dtbl tr:hover td{background:#fafeff}
.dtbl img{width:44px;height:44px;object-fit:cover;border-radius:7px;border:1px solid #eee}

/* BUTTONS */
.btn{border:none;padding:8px 14px;border-radius:7px;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-weight:600;transition:all .18s;font-family:inherit}
.btn-pri{background:var(--base);color:#fff}.btn-pri:hover{background:var(--base2)}
.btn-del{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}.btn-del:hover{background:#fca5a5}
.btn-edit{background:#fef9c3;color:#854d0e;border:1px solid #fde68a}.btn-edit:hover{background:#fde68a}
.btn-info{background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd}.btn-info:hover{background:#bae6fd}
.btn-sm{padding:5px 9px;font-size:12px}
.btn-ic{padding:5px 8px}

/* FORMS */
.fg{margin-bottom:13px}
.lbl{font-size:12px;font-weight:700;color:#444;margin-bottom:5px;display:block;letter-spacing:.2px}
.fc{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;transition:border-color .2s;outline:none;color:#333;font-family:inherit}
.fc:focus{border-color:var(--base);box-shadow:0 0 0 3px rgba(12,100,71,.08)}
textarea.fc{resize:vertical;min-height:70px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* BADGE */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bdg-success{background:#dcfce7;color:#15803d}
.bdg-warning{background:#fef9c3;color:#854d0e}
.bdg-danger{background:#fee2e2;color:#dc2626}
.bdg-info{background:#e0f2fe;color:#075985}
.bdg-gray{background:#f1f5f9;color:#475569}

/* STATUS SELECT */
.sts-sel{padding:4px 8px;font-size:12px;border:1.5px solid #e2e8f0;border-radius:6px;outline:none;cursor:pointer;background:#fff;font-family:inherit}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:18px}
.modal-ov.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:24px;max-width:660px;width:100%;max-height:90vh;overflow-y:auto;animation:fup .25s ease}
@keyframes fup{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid #f0f2f5}
.modal-title{font-size:16px;font-weight:800;color:#1a1a2e}
.modal-close{background:none;border:none;font-size:21px;color:#bbb;cursor:pointer;line-height:1;padding:0;transition:color .2s}
.modal-close:hover{color:#555}
.modal-ft{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid #f0f2f5}

/* UPLOAD */
.upload-area{border:2px dashed #e2e8f0;border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;background:#f8fafc}
.upload-area:hover{border-color:var(--base);background:#f0f9f4}
.img-prev-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}
.img-thumb{position:relative;width:68px;height:68px}
.img-thumb img{width:68px;height:68px;object-fit:cover;border-radius:7px;border:2px solid #eee}
.img-del-btn{position:absolute;top:-6px;right:-6px;background:#dc2626;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}

/* COLOR PICKER */
.color-row{display:flex;align-items:center;gap:8px}
.color-inp{width:44px;height:32px;border:none;border-radius:6px;cursor:pointer;padding:2px;flex-shrink:0}

/* SEARCH */
.srch-inp{padding:8px 13px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.srch-inp:focus{border-color:var(--base)}

/* SPINNER */
.spin{width:32px;height:32px;border:3px solid #e8ecf0;border-top-color:var(--base);border-radius:50%;animation:sp .7s linear infinite}
.spin-box{display:flex;justify-content:center;align-items:center;padding:40px}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
.toast-wr{position:fixed;top:65px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.toast{background:#fff;border-radius:9px;padding:12px 16px;box-shadow:0 4px 22px rgba(0,0,0,.14);display:flex;align-items:center;gap:9px;min-width:240px;animation:tsl .3s ease;font-size:13px;pointer-events:all}
.toast.success{border-left:4px solid var(--base)}.toast.error{border-left:4px solid #dc2626}.toast.info{border-left:4px solid #3b82f6}
@keyframes tsl{from{transform:translateX(65px);opacity:0}to{transform:translateX(0);opacity:1}}

/* DASHBOARD QUICK STATS ROW */
.recent-activity{display:grid;grid-template-columns:1fr 280px;gap:16px}

/* INFO ALERT */
.alert-info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 16px;font-size:13px;color:#1e40af;display:flex;gap:9px;align-items:flex-start;margin-bottom:16px}

/* ORDER NOTIFICATION POPUP */
.ord-notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99999;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ord-notif-box{background:#fff;border-radius:18px;padding:30px 28px 24px;max-width:420px;width:90%;box-shadow:0 24px 70px rgba(0,0,0,.3);text-align:center;animation:popIn .25s ease}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.ord-notif-icon{width:64px;height:64px;background:linear-gradient(135deg,#0c6447,#003d17);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;color:#fff;box-shadow:0 6px 22px rgba(12,100,71,.4)}
.ord-notif-pulse{animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 6px 22px rgba(12,100,71,.4)}50%{box-shadow:0 6px 34px rgba(12,100,71,.7)}}
.ord-notif-title{font-size:20px;font-weight:800;color:#1a2e22;margin-bottom:6px}
.ord-notif-sub{font-size:13px;color:#666;margin-bottom:18px;line-height:1.5}
.ord-notif-info{background:#f0f9f4;border-radius:10px;padding:13px 16px;margin-bottom:18px;text-align:left}
.ord-notif-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:3px 0}
.ord-notif-row span:first-child{color:#666}
.ord-notif-row span:last-child{font-weight:700;color:#1a2e22}
.ord-notif-btns{display:flex;gap:10px;justify-content:center}
.ord-notif-view{background:linear-gradient(135deg,var(--base),var(--base2));color:#fff;border:none;padding:11px 24px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.ord-notif-close{background:#f1f5f9;color:#555;border:none;padding:11px 20px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

/* RESPONSIVE */
@media(max-width:1100px){.stats-grid{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-area{margin-left:0}.recent-activity{grid-template-columns:1fr}}
@media(max-width:640px){.stats-grid{grid-template-columns:1fr}.pg-area{padding:13px}.form-grid{grid-template-columns:1fr}.form-grid3{grid-template-columns:1fr}.modal-box{max-width:100%!important;margin:8px;border-radius:12px;padding:18px}.dtbl th,.dtbl td{padding:8px 10px;font-size:12px}.topbar{height:50px;padding:0 14px}.card-hd{flex-wrap:wrap;gap:6px;padding:10px 13px}.ord-notif-box{padding:22px 16px 18px}}
</style>
</head>
<body>
<div class="toast-wr" id="toast-wr"></div>

<!-- ══════════════════════════════ LOGIN ══════════════════════════════ -->
<div id="login-screen">
  <div class="login-bg-pattern"></div>
  <div class="login-card">
    <div class="login-logo-area">
      <div class="login-logo-circle" id="l-logo-circle">
        <img id="l-logo-img" src="" alt="">
        <i class="fa-solid fa-leaf" id="l-logo-ic"></i>
      </div>
      <div class="login-site-nm" id="l-site-nm">Nodir Tir Health Care</div>
      <div class="login-sub">🔐 Admin Control Panel</div>
    </div>

    <div class="login-err" id="login-err">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <span id="login-err-msg">Login failed</span>
    </div>

    <div class="lg-group">
      <label class="lg-lbl"><i class="fa-solid fa-envelope" style="color:var(--base)"></i> Admin Email</label>
      <input class="lg-inp" id="l-email" type="email" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="lg-group">
      <label class="lg-lbl"><i class="fa-solid fa-lock" style="color:var(--base)"></i> Password</label>
      <div class="pwd-rel">
        <input class="lg-inp" id="l-pass" type="password" placeholder="Enter password" autocomplete="current-password" style="padding-right:44px">
        <button class="pwd-eye" onclick="toggleEye()" type="button"><i class="fa-regular fa-eye" id="l-eye"></i></button>
      </div>
    </div>
    <button class="lg-btn" id="login-btn" onclick="doLogin()">
      <i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel
    </button>
    <p style="text-align:center;margin-top:18px;font-size:12px;color:#aaa">
      Forgot access? Contact system administrator
    </p>
  </div>
</div>

<!-- ══════════════════════════════ ADMIN MAIN ══════════════════════════════ -->
<div id="admin-main">
<div class="admin-wrap">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-logo-box" id="sb-logo-box">
      <img id="sb-logo-img" src="" alt="">
      <i class="fa-solid fa-leaf" id="sb-logo-ic"></i>
    </div>
    <div>
      <div class="sb-site-nm" id="sb-nm">NTH Care</div>
      <div class="sb-site-sub">Admin Panel v2.0</div>
    </div>
  </div>
  <nav style="flex:1;padding-bottom:10px">
    <div class="sb-sec-lbl">Main</div>
    <a class="sb-link active" id="sl-dashboard" onclick="showPage('dashboard')"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
    <div class="sb-sec-lbl">Catalog</div>
    <a class="sb-link" id="sl-products" onclick="showPage('products')"><i class="fa-solid fa-boxes-stacked"></i> Products</a>
    <a class="sb-link" id="sl-categories" onclick="showPage('categories')"><i class="fa-solid fa-tags"></i> Categories</a>
    <a class="sb-link" id="sl-banners" onclick="showPage('banners')"><i class="fa-solid fa-image"></i> Banners</a>
    <div class="sb-sec-lbl">Sales</div>
    <a class="sb-link" id="sl-orders" onclick="showPage('orders')"><i class="fa-solid fa-bag-shopping"></i> Orders <span class="sb-pend" id="pend-badge" style="display:none">0</span></a>
    <a class="sb-link" id="sl-customers" onclick="showPage('customers')"><i class="fa-solid fa-users"></i> Customers</a>
    <a class="sb-link" id="sl-messages" onclick="showPage('messages')"><i class="fa-solid fa-envelope"></i> Messages</a>
    <div class="sb-sec-lbl">Settings</div>
    <a class="sb-link" id="sl-settings" onclick="showPage('settings')"><i class="fa-solid fa-gear"></i> Site Settings</a>
    <a class="sb-link" id="sl-admins" onclick="showPage('admins')"><i class="fa-solid fa-user-shield"></i> Admin Users</a>
  </nav>
  <div class="sb-foot">
    <button class="sb-logout" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </div>
</aside>

<!-- MAIN CONTENT AREA -->
<div class="main-area">
  <div class="topbar">
    <div class="tb-left">
      <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fa-solid fa-bars"></i></button>
      <span class="tb-bc" id="tb-bc">Dashboard</span>
    </div>
    <div class="tb-right">
      <span class="tb-admin-nm" id="tb-admin-nm">Admin</span>
      <div class="admin-av" id="admin-av">A</div>
    </div>
  </div>
  <div class="pg-area" id="pg-area">
    <div class="spin-box"><div class="spin"></div></div>
  </div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

// ─── TOAST ────────────────────────────────────────────────────────────────────
window.toast=function(msg,type='success'){
  const ic={success:'✅',error:'❌',info:'ℹ️'};
  const t=document.createElement('div');t.className=`toast ${type}`;
  t.innerHTML=`<span>${ic[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-wr').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(65px)';setTimeout(()=>t.remove(),300)},3200);
};

async function uploadImg(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>resolve(e.target.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

// ─── REAL-TIME ORDER NOTIFICATION ────────────────────────────────────────────
let _ordNotifUnlisten=null;
let _knownOrderKeys=new Set();
let _ordNotifReady=false;

function startOrderNotificationListener(){
  if(_ordNotifUnlisten)return;
  _ordNotifUnlisten=onValue(ref(db,'orders'),snap=>{
    if(!_ordNotifReady){
      if(snap.exists())snap.forEach(o=>_knownOrderKeys.add(o.key));
      _ordNotifReady=true;
      return;
    }
    if(snap.exists()){
      snap.forEach(o=>{
        if(!_knownOrderKeys.has(o.key)){
          _knownOrderKeys.add(o.key);
          showOrderNotifPopup(o.key,o.val());
          loadPendingBadge();
        }
      });
    }
  });
}

// ─── AUTH - FIXED LOGIN (no race condition) ──────────────────────────────────
// onAuthStateChanged only handles PAGE REFRESH case (when user was already logged in)
onAuthStateChanged(auth,async user=>{
  if(isLoginInProgress)return; // doLogin handles its own flow
  if(user){
    try{
      const snap=await get(ref(db,`users/${user.uid}`));
      if(snap.exists()&&snap.val().role==='admin'){
        currentUser=user;
        showAdminPanel(snap.val());
      }else if(!snap.exists()){
        // No DB record yet — auto-create admin record on first login
        const adminData={name:user.email?.split('@')[0]||'Admin',email:user.email||'',role:'admin',createdAt:new Date().toISOString()};
        await set(ref(db,`users/${user.uid}`),adminData);
        currentUser=user;
        showAdminPanel(adminData);
      }else{
        await signOut(auth);
      }
    }catch(e){await signOut(auth);}
  }
});

// doLogin fully handles its own flow (no race with onAuthStateChanged)
window.doLogin=async function(){
  hideLoginErr();
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass){showLoginErr('Please enter email and password');return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true;
  btn.innerHTML='<i class="fa-solid fa-circle-notch fa-spin"></i> Verifying...';
  isLoginInProgress=true;
  try{
    const cred=await signInWithEmailAndPassword(auth,email,pass);
    // Check admin role
    const snap=await get(ref(db,`users/${cred.user.uid}`));
    let userData=snap.exists()?snap.val():null;
    if(userData&&userData.role&&userData.role!=='admin'){
      await signOut(auth);
      showLoginErr('Access denied. This account is not an admin.');
      return;
    }
    if(!userData){
      // No DB record — auto-create admin record on first login
      userData={name:cred.user.email?.split('@')[0]||'Admin',email:cred.user.email||'',role:'admin',createdAt:new Date().toISOString()};
      await set(ref(db,`users/${cred.user.uid}`),userData);
    }
    currentUser=cred.user;
    toast('Login successful! Welcome back 👋');
    showAdminPanel(userData);
  }catch(e){
    const m={
      'auth/user-not-found':'No account found with this email',
      'auth/wrong-password':'Incorrect password. Please try again.',
      'auth/invalid-credential':'Invalid email or password. Please check and try again.',
      'auth/invalid-email':'Please enter a valid email address.',
      'auth/too-many-requests':'Too many failed attempts. Try again later.',
      'auth/network-request-failed':'Network error. Check your internet connection.'
    };
    showLoginErr(m[e.code]||e.message);
  }finally{
    isLoginInProgress=false;
    btn.disabled=false;
    btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel';
  }
};

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')doLogin();
});

    return`<tr>
      <td><img src="${img}" onerror="this.src='https://placehold.co/44x44/f5f5f5/888?text=P'" alt=""></td>
      <td><strong>${p.name}</strong>${p.featured?'<span class="bdg bdg-success" style="margin-left:6px">Featured</span>':''}<br><small style="color:#aaa;font-family:monospace">${p.sku||'No SKU'}</small></td>

      <td><span style="font-size:13px;font-weight:600">${p.stock===undefined||p.stock===null?'<span style="color:#888">∞</span>':p.stock}</span></td>
      <td><span class="bdg ${p.status==='inactive'?'bdg-danger':'bdg-success'}">${p.status||'active'}</span></td>
      <td style="text-align:center;white-space:nowrap">
        <button class="btn btn-edit btn-sm btn-ic" onclick="editProd('${p.id}')" title="Edit"><i class="fa-solid fa-pencil"></i></button>
        ${p.stock===0?`<button class="btn btn-sm btn-ic" onclick="restockProd('${p.id}')" title="Restock" style="background:#ecfdf5;color:#059669;border:1px solid #6ee7b7"><i class="fa-solid fa-rotate-left"></i></button>`:`<button class="btn btn-sm btn-ic" onclick="stockOutProd('${p.id}','${p.name.replace(/'/g,"\\'")}')" title="Mark Stock Out" style="background:#fff7ed;color:#ea580c;border:1px solid #fdba74"><i class="fa-solid fa-ban"></i></button>`}
        <button class="btn btn-del btn-sm btn-ic" onclick="delProd('${p.id}','${p.name.replace(/'/g,"\\'")}')" title="Delete"><i class="fa-solid fa-trash"></i></button>
      </td>
    </tr>`;}).join('');
}

window.filterProds=()=>{
  const q=(document.getElementById('p-srch')?.value||'').toLowerCase();
  const cat=document.getElementById('p-cat-f')?.value||'';
  let filtered=[..._prods];
  if(q)filtered=filtered.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q));
  if(cat)filtered=filtered.filter(p=>p.categoryId===cat);
  document.getElementById('prods-tb').innerHTML=prodRows(filtered);
};

window.openProdModal=()=>{
  ['pm-id','pm-nm','pm-sku','pm-price','pm-disc','pm-stock','pm-desc','pm-fdesc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('pm-cat').value='';document.getElementById('pm-status').value='active';document.getElementById('pm-feat').checked=false;
  document.getElementById('pm-imgs-prev').innerHTML='';document.getElementById('pm-ex-imgs').value='[]';_pFiles=[];
  document.getElementById('pm-title').innerHTML='<i class="fa-solid fa-plus" style="color:var(--base)"></i> Add New Product';
  document.getElementById('prod-modal').classList.add('open');
};

window.editProd=(id)=>{
  const p=_prods.find(x=>x.id===id);if(!p)return;
  document.getElementById('pm-id').value=id;document.getElementById('pm-nm').value=p.name||'';
  document.getElementById('pm-cat').value=p.categoryId||'';document.getElementById('pm-sku').value=p.sku||'';
  document.getElementById('pm-price').value=p.price||'';document.getElementById('pm-disc').value=p.discountPrice||'';
  document.getElementById('pm-stock').value=p.stock||'';document.getElementById('pm-status').value=p.status||'active';
  document.getElementById('pm-feat').checked=!!p.featured;document.getElementById('pm-desc').value=p.description||'';
  document.getElementById('pm-fdesc').value=p.fullDescription||'';
  const imgs=(p.images&&p.images.length?p.images:(p.imageUrl?[p.imageUrl]:[]));
  document.getElementById('pm-ex-imgs').value=JSON.stringify(imgs);
  document.getElementById('pm-imgs-prev').innerHTML=imgs.map((img,i)=>`<div class="img-thumb"><img src="${img}" onerror="this.src='https://placehold.co/68?text=P'" alt=""><button class="img-del-btn" onclick="rmExImg(${i})">✕</button></div>`).join('');
  _pFiles=[];
  document.getElementById('pm-title').innerHTML='<i class="fa-solid fa-pencil" style="color:var(--base)"></i> Edit Product';
  document.getElementById('prod-modal').classList.add('open');
};

window.rmExImg=(idx)=>{
  const imgs=JSON.parse(document.getElementById('pm-ex-imgs').value||'[]');
  imgs.splice(idx,1);document.getElementById('pm-ex-imgs').value=JSON.stringify(imgs);
  document.getElementById('pm-imgs-prev').innerHTML=imgs.map((img,i)=>`<div class="img-thumb"><img src="${img}"><button class="img-del-btn" onclick="rmExImg(${i})">✕</button></div>`).join('')+
    _pFiles.map(f=>`<div class="img-thumb"><img src="${URL.createObjectURL(f)}"></div>`).join('');
};

window.prevProdImgs=(input)=>{
  const nf=Array.from(input.files).slice(0,5);_pFiles=nf;
  const existing=JSON.parse(document.getElementById('pm-ex-imgs').value||'[]');
  document.getElementById('pm-imgs-prev').innerHTML=
    existing.map((img,i)=>`<div class="img-thumb"><img src="${img}"><button class="img-del-btn" onclick="rmExImg(${i})">✕</button></div>`).join('')+
    nf.map(f=>`<div class="img-thumb"><img src="${URL.createObjectURL(f)}" alt="new"></div>`).join('');
};

window.saveProd=async()=>{
  const name=document.getElementById('pm-nm').value.trim();
  const price=parseFloat(document.getElementById('pm-price').value)||0;
  if(!name){toast('Product name is required','error');return;}
  if(price<=0){toast('Price must be greater than 0','error');return;}
  const btn=document.getElementById('save-prod-btn');btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-circle-notch fa-spin"></i> Saving...';
  try{
    const catEl=document.getElementById('pm-cat');
    const catNm=catEl.options[catEl.selectedIndex]?.dataset?.nm||'';
    let imgs=JSON.parse(document.getElementById('pm-ex-imgs').value||'[]');
    for(const f of _pFiles){const u=await uploadImg(f,`products/${Date.now()}_${f.name.replace(/\s/g,'_')}`);imgs.push(u);}
    const id=document.getElementById('pm-id').value;
    const dv=document.getElementById('pm-disc').value;
    const sv=document.getElementById('pm-stock').value;
    const data={
      name,categoryId:document.getElementById('pm-cat').value,category:catNm,
      sku:document.getElementById('pm-sku').value.trim(),price,
      discountPrice:dv?parseFloat(dv):null,stock:sv!==''?parseInt(sv):null,
      status:document.getElementById('pm-status').value,featured:document.getElementById('pm-feat').checked,
      description:document.getElementById('pm-desc').value.trim(),
      fullDescription:document.getElementById('pm-fdesc').value.trim(),
      images:imgs,imageUrl:imgs[0]||'',updatedAt:new Date().toISOString()
    };
    if(id){await update(ref(db,`products/${id}`),data);toast('Product updated successfully!');}
    else{data.createdAt=new Date().toISOString();await push(ref(db,'products'),data);toast('Product added successfully!');}
    _pFiles=[];closeModal('prod-modal');pageProducts();
  }catch(e){toast(e.message,'error');}
  finally{btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-floppy-disk"></i> Save Product';}
};

window.delProd=async(id,name)=>{
  if(!confirm(`Delete "${name}"?\n\nThis action cannot be undone.`))return;
  await remove(ref(db,`products/${id}`));toast('Product deleted','info');pageProducts();
};

window.stockOutProd=async(id,name)=>{
  if(!confirm(`Mark "${name}" as Stock Out?\n\nCustomers will see "Stock Out" on this product.`))return;
  await update(ref(db,`products/${id}`),{stock:0,updatedAt:new Date().toISOString()});
  toast(`"${name}" marked as Stock Out`,'info');pageProducts();
};
window.restockProd=async(id)=>{
  const qty=prompt('Enter restock quantity:','100');
  if(qty===null)return;
  const n=parseInt(qty)||100;
  await update(ref(db,`products/${id}`),{stock:n,updatedAt:new Date().toISOString()});
  toast(`Product restocked with ${n} units`);pageProducts();
};

let _orders=[];
async function pageOrders(){

  const snap=await get(ref(db,'orders'));
  _orders=[];if(snap.exists())snap.forEach(o=>_orders.push({id:o.key,...o.val()}));

  pg.innerHTML=`
  <div class="pg-hd">
    <h2 class="pg-title"><i class="fa-solid fa-bag-shopping"></i> Orders <span style="font-size:14px;font-weight:500;color:#888">(${_orders.length})</span></h2>
    <div style="display:flex;gap:9px;flex-wrap:wrap">
      <input class="srch-inp" id="o-srch" placeholder="Search name, phone, ID..." oninput="filterOrds()">
      <select class="fc" style="width:auto;padding:8px 12px" id="o-sts-f" onchange="filterOrds()">
        <option value="">All Status</option>

  </div>

    <div class="tbl-wrap"><table class="dtbl">
      <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th><th style="text-align:center">Actions</th></tr></thead>
      <tbody id="ords-tb">${ordRows(_orders)}</tbody>
    </table></div>
  </div>
  <div class="modal-ov" id="ord-modal">
    <div class="modal-box" style="max-width:620px">
      <div class="modal-hd"><h3 class="modal-title"><i class="fa-solid fa-receipt" style="color:var(--base)"></i> Order Details</h3><button class="modal-close" onclick="closeModal('ord-modal')">×</button></div>
      <div id="ord-detail"></div>
    </div>

function ordRows(orders){
  if(!orders.length)return`<tr><td colspan="8" style="text-align:center;color:#aaa;padding:36px">No orders found.</td></tr>`;
  const sb=s=>({'pending':'bdg-warning','processing':'bdg-info','shipped':'bdg-info','delivered':'bdg-success','cancelled':'bdg-danger'}[s]||'bdg-gray');
  return orders.map(o=>`<tr>
    <td><strong style="font-size:11.5px;font-family:monospace">${o.orderId||o.id}</strong></td>
    <td><strong>${o.customerName||'N/A'}</strong><br><small style="color:#aaa">${o.phone||''}</small></td>
    <td style="font-size:12.5px">${(o.items||[]).length} items</td>
    <td><strong style="color:var(--base)">৳${(o.total||0).toLocaleString()}</strong></td>
    <td><span style="font-size:12px;font-weight:600;color:#666">${(o.paymentMethod||'cod').toUpperCase()}</span></td>
    <td><select class="sts-sel" onchange="updateOrderStatus('${o.id}',this.value)">
      ${['pending','processing','shipped','delivered','cancelled'].map(s=>`<option value="${s}"${o.status===s?' selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
    </select></td>
    <td style="font-size:11.5px;color:#aaa">${new Date(o.createdAt||Date.now()).toLocaleDateString('en-BD')}</td>
    <td style="text-align:center"><button class="btn btn-info btn-sm btn-ic" onclick="viewOrd('${o.id}')" title="View"><i class="fa-solid fa-eye"></i></button></td>
  </tr>`).join('');
}
window.filterOrds=()=>{
  const q=(document.getElementById('o-srch')?.value||'').toLowerCase();
  const f=document.getElementById('o-sts-f')?.value||'';
  let filtered=[..._orders];
  if(q)filtered=filtered.filter(o=>(o.customerName||'').toLowerCase().includes(q)||(o.phone||'').includes(q)||(o.orderId||'').toLowerCase().includes(q));
  if(f)filtered=filtered.filter(o=>o.status===f);
  document.getElementById('ords-tb').innerHTML=ordRows(filtered);
};
window.viewOrd=(id)=>{
  const o=_orders.find(x=>x.id===id);if(!o)return;
  document.getElementById('ord-detail').innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px;background:#f8f9fa;border-radius:9px;margin-bottom:14px;font-size:13px">

    <div><strong>Date:</strong><br>${new Date(o.createdAt||Date.now()).toLocaleString()}</div>
    <div><strong>Customer:</strong><br>${o.customerName||'N/A'}</div>
    <div><strong>Phone:</strong><br>${o.phone||'N/A'}</div>
    <div style="grid-column:1/-1"><strong>Delivery Address:</strong><br>${o.address||'N/A'}</div>
    <div><strong>Payment:</strong><br>${(o.paymentMethod||'cod').toUpperCase()}</div>

      whatsapp:document.getElementById('s-wa').value.trim(),

      nagadNumber:document.getElementById('s-ng').value.trim(),
      paymentNote:document.getElementById('s-pnote').value.trim(),
      updatedAt:new Date().toISOString()

  }catch(e){toast(e.message,'error');}
  finally{btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-floppy-disk"></i> Save All Settings';}
};

        createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()
      });
    }
    toast(`✅ ${products.length} products seeded successfully!`);
    pageProducts();
  }catch(e){toast('Seed failed: '+e.message,'error');}
  finally{if(btn){btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-seedling"></i> Seed Products';}}
};

// ─── INIT ────────────────────────────────────────────────────────────────────
loadSettings();
</script>
</body>
</html>
